<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jackal</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <h1>Jackal</h1>
        <div id="turn-indicator"></div>
        <div id="scores"></div>
      </header>

      <div id="conn-banner" class="hidden">Connection lost — reconnecting…</div>

      <section id="view-home" class="view">
        <div class="panel">
          <label>
            Your name
            <input id="name-input" maxlength="20" placeholder="Pirate name" />
          </label>
          <button id="create-btn">Create a game</button>
          <div id="join-box" class="hidden">
            <p>You were invited to game <b id="join-code"></b>.</p>
            <button id="join-btn">Join the game</button>
          </div>
          <label>
            Or join with a game code
            <input id="code-input" maxlength="6" placeholder="e.g. 5A4D2C" />
          </label>
          <button id="join-code-btn">Join by code</button>
        </div>
      </section>

      <section id="view-lobby" class="view hidden">
        <div class="panel">
          <p>
            Share this link with your friends:
            <input id="share-link" readonly />
            <button id="copy-btn">Copy</button>
          </p>
          <p>
            Or tell them the game code:
            <input id="game-code" readonly class="code" />
          </p>
          <label>
            Your name
            <input id="rename-input" maxlength="20" />
          </label>
          <div id="lobby-players"></div>
          <p class="note">
            The crews are laid out as they sit around the island. Crews
            controlled by the same player are allies — with two players give
            each two opposite crews.
          </p>
          <div id="seats"></div>
          <button id="start-btn" class="hidden">Start the game</button>
          <p id="lobby-hint" class="note"></p>
        </div>
      </section>

      <section id="view-game" class="view hidden">
        <div id="game-layout">
          <main id="board-wrap">
            <div id="actions"></div>
            <div id="board"></div>
          </main>
          <aside id="sidebar">
            <h2>Players</h2>
            <div id="game-players"></div>
          </aside>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
